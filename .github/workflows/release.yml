name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  BUILD_TYPE: Release
  VCPKG_COMMIT_ID: "master"

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Windows Release
  # ═══════════════════════════════════════════════════════════════════════════
  release-windows:
    name: Release Windows x64
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout vcpkg
        uses: actions/checkout@v4
        with:
          repository: microsoft/vcpkg
          ref: ${{ env.VCPKG_COMMIT_ID }}
          path: vcpkg

      - name: Bootstrap vcpkg
        run: .\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Configure CMake
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -G "Visual Studio 17 2022" -A x64

      - name: Build C++ Backend
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Build Web UI
        working-directory: ui
        run: |
          npm ci
          npm run build

      - name: Build WPF Client
        run: dotnet publish E3Studio.csproj -c Release -o publish /p:Deterministic=false

      - name: Package Release
        run: |
          $version = "${{ github.ref_name }}" -replace '^v',''
          $dir = "E3Studio-$version-win-x64"
          New-Item -ItemType Directory -Force -Path $dir
          Copy-Item "build/${{ env.BUILD_TYPE }}/E3Studio.exe" "$dir/"
          Copy-Item "build/${{ env.BUILD_TYPE }}/*.dll" "$dir/" -ErrorAction SilentlyContinue
          Copy-Item -Recurse "ui/dist" "$dir/ui"
          Copy-Item "launch.ps1" "$dir/"
          Copy-Item "LICENSE" "$dir/"
          Copy-Item "README.md" "$dir/"
          Compress-Archive -Path $dir -DestinationPath "$dir.zip"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: E3Studio-*-win-x64.zip

  # ═══════════════════════════════════════════════════════════════════════════
  # Linux Release
  # ═══════════════════════════════════════════════════════════════════════════
  release-linux:
    name: Release Linux x64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout vcpkg
        uses: actions/checkout@v4
        with:
          repository: microsoft/vcpkg
          ref: ${{ env.VCPKG_COMMIT_ID }}
          path: vcpkg

      - name: Bootstrap vcpkg
        run: ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake git ninja-build \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libgl1-mesa-dev libglu1-mesa-dev mesa-common-dev \
            libfontconfig1-dev libssl-dev pkg-config \
            autoconf autoconf-archive automake libtool

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-linux \
            -G Ninja

      - name: Build C++ Backend
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Build Web UI
        working-directory: ui
        run: |
          npm ci
          npm run build

      - name: Package Release
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          DIR="E3Studio-${VERSION}-linux-x64"
          mkdir -p "$DIR"
          cp build/bin/E3Studio "$DIR/"
          cp -r ui/dist "$DIR/ui"
          cp launch.sh "$DIR/"
          cp LICENSE "$DIR/"
          cp README.md "$DIR/"
          chmod +x "$DIR/E3Studio" "$DIR/launch.sh"
          tar -czf "${DIR}.tar.gz" "$DIR"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: E3Studio-*-linux-x64.tar.gz

  # ═══════════════════════════════════════════════════════════════════════════
  # macOS Release (ARM64)
  # ═══════════════════════════════════════════════════════════════════════════
  release-macos-arm64:
    name: Release macOS ARM64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout vcpkg
        uses: actions/checkout@v4
        with:
          repository: microsoft/vcpkg
          ref: ${{ env.VCPKG_COMMIT_ID }}
          path: vcpkg

      - name: Bootstrap vcpkg
        run: ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Install Dependencies
        run: brew install cmake ninja node autoconf autoconf-archive automake libtool

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=arm64-osx \
            -G Ninja

      - name: Build C++ Backend
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Build Web UI
        working-directory: ui
        run: |
          npm ci
          npm run build

      - name: Package Release
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          DIR="E3Studio-${VERSION}-macos-arm64"
          mkdir -p "$DIR"
          cp build/bin/E3Studio "$DIR/"
          cp -r ui/dist "$DIR/ui"
          cp launch.sh "$DIR/"
          cp LICENSE "$DIR/"
          cp README.md "$DIR/"
          chmod +x "$DIR/E3Studio" "$DIR/launch.sh"
          tar -czf "${DIR}.tar.gz" "$DIR"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: E3Studio-*-macos-arm64.tar.gz

  # ═══════════════════════════════════════════════════════════════════════════
  # Docker Release
  # ═══════════════════════════════════════════════════════════════════════════
  release-docker:
    name: Release Docker Image
    runs-on: ubuntu-22.04
    needs: [release-linux]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: yahyasvm
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            yahyasvm/e3studio:latest
            yahyasvm/e3studio:${{ steps.version.outputs.VERSION }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
