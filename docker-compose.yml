version: '3.8'

services:
  e3studio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: e3studio
    ports:
      - "3000:3000"   # Web UI
      - "9001:9001"   # WebSocket API
    volumes:
      - ./projects:/app/projects
      - ./logs:/app/logs
    environment:
      - E3STUDIO_PORT=3000
      - E3STUDIO_API_PORT=9001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
